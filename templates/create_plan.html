<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CREATE PLAN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>  
	body {
		background-color: #f8f9fa;
	}
	.mt-5 {
            margin-top: 2rem !important;
        }

	.container {
		background-color: #fff;
		padding: 2rem;
		border-radius: 16px;
		box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
	}
	
	mt-5 {
    margin-top: 2rem !important;
}

	h2 {
		font-weight: 600;
		color: #fff;
		margin: 0;
	}      

	.btn {
		border-radius: 50px;
		padding: 6px 20px;
		font-weight: 500;
	}

	table.dataTable thead {
		background-color: #0d6efd;
		color: white;
	}

	tfoot {
		display: none;
	}

	.back-icon {
		font-size: 1.4rem;
		color: #fff;
		text-decoration: none;
	}

	.back-icon:hover {
		color: #d1e0ff;
	}

	.page-header {
		background-color: #0d6efd;
		padding: 1rem 1.5rem;
		border-radius: 10px;
		margin-bottom: 1.5rem;
	}

	.page-header {
		background-color: #0d6efd;
		padding: 0.5rem 1rem;
		border-radius: 10px;
		margin-bottom: 1.5rem;
	}

	h2 {
		font-weight: 600;
		color: #fff;
		font-size: 1.25rem;
		margin: 0;
	}

	.back-icon {
		font-size: 1.2rem;
		color: #fff;
		text-decoration: none;
		line-height: 1;
	}

	.select2-container .select2-selection--single,
    .select2-container .select2-selection--multiple {
      height: 38px;
      padding: 5px;
    }

     .loadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(255, 255, 255, 0.3);
      display: flex !important;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      cursor: wait;
      display: none;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #dbe3ff;
      border-top: 6px solid #0d6efd;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    </style>
</head>
<body>
<div class="container mt-5">
  <div class="page-header d-flex justify-content-between align-items-center">
	<div class="d-flex align-items-center">
		<a href="/plans" class="me-3 back-icon"><i class="bi bi-arrow-left-circle-fill"></i></a>
		<h2>Create Plan</h2>
	</div>
</div>

  <form>    
    <div class="mb-3">
      <label for="displayName" class="form-label">Display Name</label>
      <input type="text" class="form-control" id="displayName" placeholder="">
    </div>

    <div class="mb-3">
      <label for="audienceId" class="form-label">Audience</label>
      <select id="audienceId" class="form-select select2-single">
        <option value="">Select Audience</option>
      </select>
    </div>

    <div class="mb-3">
      <label for="campaignIds" class="form-label">Campaigns</label>
      <select id="campaignIds" class="form-select select2-multi" multiple>
      </select>
    </div>

    <div class="mb-3" style="display:none">
      <label for="rateCard" class="form-label">Rate Cards</label>
      <select id="rateCard" class="form-select select2-multi" multiple>
      </select>
    </div>

     <div class="mb-3">
      <label for="importNetworkDaypartsId" class="form-label">Import Network Dayparts</label>
      <input type="file" class="form-control" id="importNetworkDaypartsId" >
    </div>

    <div class="mb-3">
      <label for="budget" class="form-label">Budget</label>
      <input type="number" class="form-control" id="budget" value="50000000">
    </div>

    <button type="submit" class="btn btn-primary" id="submitBtn">Submit</button>
  </form>

</div>

<br/>
<div id="loadingOverlay">
  <div class="loadingOverlay">
    <div class="text-center">
      <div class="spinner"></div>
    </div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
  let campaignList = [];
  $(document).ready(function () {
        $("#loadingOverlay").hide();

        function getAudiencesList(){
          $.ajax({
            url: '/get-audiences-list',
            type: 'GET',
            success: function (result) {
                let resultJson = typeof result === "string" ? JSON.parse(result) : result;
                let data = resultJson.data || [];

                const $audienceSelect = $('#audienceId');
                $audienceSelect.empty().append(`<option value="">Select Audience</option>`);

                $.each(data, function (index, item) {
                    const id = item.audienceUUId || '';
                    const name = item.name || '';
                    if (id && name) {
                        const option = new Option(name, id, false, false);
                        $audienceSelect.append(option);
                    }
                });

                $audienceSelect.trigger('change');
            },
            error: function (xhr, status, error) {
                console.error("Error fetching audience list:", error);
            }
          });
        }

      function getRateCardList(){
        $.ajax({
            url: '/get-rate-card-list',
            type: 'GET',
            data: { inventoryId: 'eb72a659-02ef-4bec-bf15-39e935262c73' },
            success: function (result) {
                let resultJson = typeof result === "string" ? JSON.parse(result) : result;
                let titles = resultJson.titles || [];

                const $rateCardSelect = $('#rateCard');
                $rateCardSelect.empty().append(`<option value="">Select</option>`);

                $.each(titles, function (index, item) {
                    const id = item.id || '';
                    const name = item.title_name || '';
                    if (id && name) {
                        const option = new Option(name, id, false, false);
                        $rateCardSelect.append(option);
                    }
                });

                $rateCardSelect.trigger('change');
            },
            error: function (xhr, status, error) {
                console.error("Error fetching rateCard list:", error);
            }
        });
      }

      $('form').on('submit', function (e) {
        e.preventDefault();

        let displayName = $('#displayName').val().trim();
        let audienceId = $('#audienceId').val();
        let campaignIds = $('#campaignIds').val();
        let budget = $('#budget').val().trim();
        let file = $('#importNetworkDaypartsId')[0].files[0];

        if (!displayName) return alert("Display Name is required.");
        if (!audienceId) return alert("Audience is required.");
        if (!campaignIds || campaignIds.length === 0) return alert("At least one Campaign must be selected.");
        if (!budget || isNaN(budget) || Number(budget) <= 0) return alert("Valid Budget is required.");

        $('#submitBtn').prop('disabled', true);

        let campaignId = campaignIds[0];
        let itemCampaign = campaignList.find(obj => obj.id === campaignId);
        let creativeDuration = (itemCampaign && itemCampaign.creative_durations_seconds && itemCampaign.creative_durations_seconds.length > 0)
          ? itemCampaign.creative_durations_seconds[0] : 6;
        console.log("itemCampaign", itemCampaign, "creativeDuration", creativeDuration);

        let formData = new FormData();
        formData.append("creative_duration", creativeDuration);
        formData.append("display_name", displayName);
        formData.append("audience_id", audienceId);
        campaignIds.forEach(id => formData.append("campaign_ids[]", id));
        
        formData.append("budget", budget);
        if (file) {
          formData.append("import_file", file);
        }

        $.ajax({
          url: '/submit-plan',
          type: 'POST',
          data: formData,
          processData: false,  // prevent jQuery from transforming the data
          contentType: false,  // let browser set proper multipart/form-data
          success: function (res) {
            alert("Plan submitted successfully!");
            console.log("Response:", res);
            $('#submitBtn').prop('disabled', false);
            window.location.href = "/plans";
          },
          error: function (xhr, status, error) {
            $('#submitBtn').prop('disabled', false);
            console.error("Submit failed:", error);
            alert("Failed to submit plan.");
          }
        });
      });


    $('.select2-single').select2({ placeholder: "Select an option", allowClear: true });
    $('.select2-multi').select2({ placeholder: "Select one or more options" });

    function getCampaignList(){
      const selectedAudience = $("#audienceId").val();
      const $campaignSelect = $('#campaignIds');

      $campaignSelect.empty();
      //$campaignSelect.trigger('change');
      if (!selectedAudience) return;

      $.ajax({
        url: '/get-campaign-list',
        type: 'GET',
        data: { audienceId: selectedAudience },
        success: function (response) {
          let resultJson = typeof response === "string" ? JSON.parse(response) : response;
          let campaigns = resultJson.results || [];
          campaignList = campaigns;
          console.log("campaigns", campaigns);

          campaigns.forEach(function (item) {
            const campaignId = item.id;
            const campaignName = item.display_name;
            if (campaignId && campaignName) {
              const newOption = new Option(campaignName, campaignId, false, false);
              $campaignSelect.append(newOption);
            }
          });

          $campaignSelect.trigger('change');
        },
        error: function (xhr, status, error) {
          console.error("Error fetching campaign list:", error);
        }
      });
    }

    $('#audienceId').on('change', function () {
      getCampaignList();
    });

    getAudiencesList();
    getRateCardList();
  });
</script>
</body>
</html>
