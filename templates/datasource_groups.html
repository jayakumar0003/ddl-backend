<!DOCTYPE html>
<html>
<head>
    <title>Datasource Groups</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <style>
        body {
            background-color: #f8f9fa;
        }

        .mt-5 {
            margin-top: 2rem !important;
        }

        .container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-weight: 600;
            color: #fff;
            margin: 0;
        }

        .dataTables_wrapper .dataTables_length {
            display: none; /* hide Show entries dropdown */
        }

        .dataTables_wrapper .dataTables_filter {
            float: left !important; /* move search box to left */
        }

        .btn {
            border-radius: 50px;
            padding: 6px 20px;
            font-weight: 500;
        }

        table.dataTable thead {
            background-color: #0d6efd;
            color: white;
        }

        tfoot {
            display: none;
        }

        .back-icon {
            font-size: 1.4rem;
            color: #fff;
            text-decoration: none;
        }

        .back-icon:hover {
            color: #d1e0ff;
        }

        .page-header {
            background-color: #0d6efd;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }

		.page-header {
    background-color: #0d6efd;
    padding: 0.5rem 1rem;
    border-radius: 10px;
    margin-bottom: 1.5rem;
}

h2 {
    font-weight: 600;
    color: #fff;
    font-size: 1.25rem;
    margin: 0;
}

.back-icon {
    font-size: 1.2rem;
    color: #fff;
    text-decoration: none;
    line-height: 1;
}
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <a href="/" class="me-3 back-icon"><i class="bi bi-arrow-left-circle-fill"></i></a>
            <h2>Datasource Groups</h2>
        </div>
        <div>
            <button class="btn btn-light" onclick="window.location='/create-datasource-group'">Create Datasource Group</button>
        </div>
    </div>

    <div class="table-responsive">
        <table id="dsTable" class="display table table-striped" style="width:100%">
            <thead>
                <tr>
                   <th>ID</th>
                    <th>Name</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Currency Of Record</th>
                    <th>Created On</th>
                    <th></th>
                </tr>
            </thead>
             <tbody>
                <tr><td colspan="6" class="text-center">Fetching data, Please wait...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    $(document).ready(function () {
        $.ajax({
            url: '/get-datasource-groups',
            type: 'GET',
            success: function (result) {
                let resultJson = JSON.parse(result);
                console.log("resultJson", resultJson);
                let data = resultJson.results;
                console.log("data", data);
                let rows = '';
                $.each(data, function (index, item) {
                    rows += `<tr>
                        <td>${item.id}</td>
                        <td>${item.name}</td>
                        <td>${item.filter_start_date}</td>
                        <td>${item.filter_end_date}</td>
                        <td>${item.currency_of_record}</td>
                        <td>${item.created_at}</td>
                        <td class="text-center">
                           <div class="d-flex justify-content-center gap-3">
                                <a href="#" onclick="fnView('${item.id}')" title="View">
                                    <i class="bi bi-eye text-primary fs-5"></i>
                                </a>
                                <a href="#" onclick="fnClone('${item.id}')" title="Clone">
                                    <i class="bi bi-files text-success fs-5"></i>
                                </a>
                                <a href="#" onclick="fnDelete('${item.id}')" title="Delete">
                                    <i class="bi bi-trash text-danger fs-5"></i>
                                </a>
                            </div>
                        </td>
                    </tr>`;
                });
                $('#dsTable tbody').html(rows);
                $('#dsTable').DataTable({
                        destroy: true,
                        order: [[5, 'desc']],
                        searching: true
                    });
            },
            error: function (xhr, status, error) {
                console.error("Error fetching data:", error);
            }
        });
    });

    function fnDelete(id) {
        if (confirm("Are you sure you want to delete this?")) {
            console.log("Delete report:", id);

            $("#loadingOverlay").show();
            $.ajax({
                url: '/delete-datasource-group',
                type: 'GET',
                data: {
                datasourceGroupID: id
                },
                success: function (result) {
                    let resultJson = JSON.parse(result);
                    console.log("resultJson", resultJson);
                    $("#loadingOverlay").hide();

                    alert("Datasource Group deleted successfully.");

                    let table = $('#dsTable').DataTable();
                    table
                        .rows(function (idx, data, node) {
                            return data[0] === id;
                        })
                        .remove()
                        .draw();
                },
                error: function (xhr, status, error) {
                    console.error("Error deleting the datasource group:", error);
                    $("#loadingOverlay").hide();
                },
                complete: function () {
                    $("#loadingOverlay").hide();
                }
            });
        }
    }

    function fnView(id) {
        window.location = "/view-datasource-group?id=" + id;
    }

    function fnClone(id) {
        window.location = "/create-datasource-group?id=" + id;
    }
</script>

</body>
</html>
