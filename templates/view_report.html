<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>  
	body {
		background-color: #f8f9fa;
	}
	.mt-5 {
            margin-top: 2rem !important;
        }

	.container {
		background-color: #fff;
		padding: 2rem;
		border-radius: 16px;
		box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
	}
	
	mt-5 {
    margin-top: 2rem !important;
}

	h2 {
		font-weight: 600;
		color: #fff;
		margin: 0;
	}      

	.btn {
		border-radius: 50px;
		padding: 6px 20px;
		font-weight: 500;
	}

	table.dataTable thead {
		background-color: #0d6efd;
		color: white;
	}

	tfoot {
		display: none;
	}

	.back-icon {
		font-size: 1.4rem;
		color: #fff;
		text-decoration: none;
	}

	.back-icon:hover {
		color: #d1e0ff;
	}

	.page-header {
		background-color: #0d6efd;
		padding: 1rem 1.5rem;
		border-radius: 10px;
		margin-bottom: 1.5rem;
	}

	.page-header {
		background-color: #0d6efd;
		padding: 0.5rem 1rem;
		border-radius: 10px;
		margin-bottom: 1.5rem;
	}

	h2 {
		font-weight: 600;
		color: #fff;
		font-size: 1.25rem;
		margin: 0;
	}

	.back-icon {
		font-size: 1.2rem;
		color: #fff;
		text-decoration: none;
		line-height: 1;
	}

	.select2-container .select2-selection--single,
    .select2-container .select2-selection--multiple {
      padding: 5px;
    }

    .loadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(255, 255, 255, 0.3);
      display: flex !important;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      cursor: wait;
      display: none;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #dbe3ff;
      border-top: 6px solid #0d6efd;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    a i.bi {
        transition: transform 0.2s ease, opacity 0.2s ease;
    }
    a:hover i.bi {
        transform: scale(1.2);
        opacity: 0.8;
    }
    </style>
</head>
<body>
<div class="container mt-5">
  <div class="page-header d-flex justify-content-between align-items-center">

    <div class="d-flex align-items-center">
        <a href="/measurement-reports" class="me-3 back-icon">
            <i class="bi bi-arrow-left-circle-fill"></i>
        </a>
        <h2>View Report</h2>
    </div>

    <!-- Right-side icons -->
    <div class="d-flex align-items-center gap-3">
        <a href="#" onclick="fnCloneReport()" class="text-white">
            <i class="bi bi-files" style="font-size: 1.3rem;"></i>
        </a>
        <a href="#" onclick="fnDeleteReport()" class="text-white">
            <i class="bi bi-trash" style="font-size: 1.3rem;"></i>
        </a>
    </div>
  </div>

  <form>
     <div class="mb-3">
      <label for="requestType" class="form-label">Request Type</label>
      <select id="requestType" class="form-select" disabled>
          <option value="ESSENTIALS">Ads - Audience Essentials</option>
          <option value="ADVANCED_RF">Ads - Advanced Reach & Frequency</option>
          <option value="DAYPART">Content - Network/Daypart Report</option>
      </select>
    </div>

    <div class="mb-3">
      <label for="reportName" class="form-label">Name</label>
      <input type="text" class="form-control" id="reportName" placeholder="" disabled>
    </div>

    <!--<div class="mb-3">
      <label for="businessUnit" class="form-label">Business Unit</label>
      <select id="businessUnit" class="form-select">
          <option value="Nexus">Nexus</option>
      </select>
    </div>-->

    <div class="mb-3">
      <label for="startDate" class="form-label">Start Date</label>
     <input type="date" class="form-control" id="startDate" disabled>
    </div>

    <div class="mb-3">
      <label for="endDate" class="form-label">End Date</label>
     <input type="date" class="form-control" id="endDate" disabled>
    </div>

    <div class="mb-3">
      <label for="currencyOfRecord" class="form-label">Currency Of Record *</label>
      <select id="currencyOfRecord" class="form-select" disabled>
          <option value="24">2023-24 Currency</option>
          <option value="25">2024-25 Currency</option>
          <option value="26">2025-26 Currency</option>
      </select>
    </div>

    <!--<div class="mb-3">
      <label for="timeShift" class="form-label">Time Shift *</label>
      <select id="timeShift" class="form-select">
          <option value="plus7">Live + 7</option>
      </select>
    </div>-->

    <div class="mb-3">
      <label for="audienceId" class="form-label">Audience</label>
      <select id="audienceId" class="form-select select2-multi" multiple disabled>
      </select>
    </div>

    <div class="mb-3">
      <label for="datasourceGroupId" class="form-label">Datasource Groups</label>
      <select id="datasourceGroupId" class="form-select select2-multi" multiple disabled>
      </select>
    </div>

    <div class="mb-3">
      <label for="throughDate" class="form-label">Data Available Through Date</label>
      <input type="text" class="form-control" id="throughDate" placeholder="" disabled>
    </div>

    <button type="button" id="btnDataExport" onclick="fnDataExport()" class="btn btn-light" style="background-color:#7defef;display:none;">
        Data Export
    </button>
    <button type="button" id="btnSpotLevelExport" onclick="fnSpotLevelExport()" class="btn btn-light" style="background-color:#0dcaf0;display:none;">
        Spot Level Export
    </button>

    <button type="button" id="btnSendEmail"
        class="btn btn-light"
        style="background-color:#ffd966;display:none;"
        onclick="openEmailModal()">
    Send Email
</button>

  </form>

</div>
  <br/>
<div id="loadingOverlay">
  <div class="loadingOverlay">
    <div class="text-center">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<div class="modal fade" id="emailModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Send Spot Level Export</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">To Email *</label>
          <input type="email" id="toEmail" class="form-control"
                 placeholder="example@company.com" required>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="sendEmail()">Send</button>
      </div>

    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function fnDataExport() {
    console.log("Data Export Link:", dataExportLink);
    window.open(dataExportLink, '_blank');
}

function fnSpotLevelExport() {
    console.log("Spot Level Export Link:", spotLevelExportLink);
    window.open(spotLevelExportLink, '_blank');
}

function fnDeleteReport() {
        if (confirm("Are you sure you want to delete this report?")) {
            console.log("Delete report:", reportId);

            $("#loadingOverlay").show();
            $.ajax({
                url: '/delete-admeasurement',
                type: 'GET',
                data: {
                reportID: reportId
                },
                success: function (result) {
                    let resultJson = JSON.parse(result);
                    console.log("resultJson", resultJson);
                    $("#loadingOverlay").hide();

                    alert("Report deleted successfully.");
                    window.location = "/measurement-reports";
                },
                error: function (xhr, status, error) {
                    console.error("Error deleting the report:", error);
                    $("#loadingOverlay").hide();
                },
                complete: function () {
                    $("#loadingOverlay").hide();
                }
            });
        }
    }

    function fnCloneReport() {
        window.location = "/create-report?id=" + reportId;
    }

    let params = new URLSearchParams(window.location.search);
    let reportId = params.get('id');
    console.log("reportId", reportId);
    let dataExportLink = "";
    let spotLevelExportLink = "";

$(document).ready(function () {
   function safeJsonParse(str) {
        try {
          return typeof str === "string" ? JSON.parse(str) : str;
        } catch (e) {
          console.error("JSON parse error:", e);
          return {};
        }
    }

    function loadAudiences(currencyVal, optionVal = []) {
        $("#loadingOverlay").show();
        $.ajax({
            url: '/get-audiences-by-year',
            type: 'GET',
            data: { currencyOfRecord: currencyVal },
            success: function (result) {
              const data = safeJsonParse(result).data || [];
              const $audienceSelect = $('#audienceId');
              $audienceSelect.empty().append('<option value="">Select Audience</option>');

              data.forEach(item => {
                if (item.audienceId && item.name) {
                  $audienceSelect.append(new Option(item.name, item.audienceId));
                }
              });

              if (optionVal) {
                $audienceSelect.val(optionVal);
              }

              $("#loadingOverlay").hide();
            },
            error: function (xhr, status, error) {
                console.error("Error fetching data:", error);
                $("#loadingOverlay").hide();
            },
            complete: function () {
                $("#loadingOverlay").hide();
            }
        });
    }

    function loadDatasourceGroups(currencyVal, optionVal = []) {
        $("#loadingOverlay").show();
        $.ajax({
            url: '/get-datasource-groups-by-year',
            type: 'GET',
            data: { currencyOfRecord: currencyVal },
            success: function (result) {
              const data = safeJsonParse(result).results || [];
              const $select = $('#datasourceGroupId');
              $select.empty().append('<option value="">Select Datasource Group</option>');

              data.forEach(item => {
                if (item.id && item.name) {
                  $select.append(new Option(item.name, item.id));
                }
              });

              if (optionVal) {
                $select.val(optionVal);
              }
              $("#loadingOverlay").hide();
            },
            error: function (xhr, status, error) {
                console.error("Error fetching data:", error);
                $("#loadingOverlay").hide();
            },
            complete: function () {
                $("#loadingOverlay").hide();
            }
        });
    }

    $('#currencyOfRecord').on('change', function () {
        const selectedCurrency = $(this).val();
        loadAudiences(selectedCurrency);
        loadDatasourceGroups(selectedCurrency);
    });

    function getReport(){
        $("#loadingOverlay").show();
        if(reportId){
            $.ajax({
                url: '/get-admeasurement',
                type: 'GET',
                data: {
                reportID: reportId
                },
                success: function (result) {
                    let ad = safeJsonParse(result);
                    console.log("adMeasurementJson", ad);

                    dataExportLink = ad?.latest_request?.outputs?.[0]?.link;
                    if (dataExportLink) {
                        $("#btnDataExport").show();
                    }
                    spotLevelExportLink = ad?.latest_request?.outputs?.[1]?.link;
                    if (spotLevelExportLink) {
                        $("#btnSpotLevelExport").show();
                        $("#btnSendEmail").show();
                    }

                    $("#reportName").val(ad.name || "");
                    $("#requestType").val(ad.type || "");
                    $("#startDate").val(ad.start_date || "");
                    $("#endDate").val(ad.end_date || "");
                    $("#currencyOfRecord").val(ad.currency_of_record || "");
                    $("#throughDate").val(ad?.latest_success_request?.through_date || "");

                    let audience_ids = ad.audience_ids || [];
                    console.log("Setting Audience:", audience_ids);

                    let data_source_group_ids = ad.data_source_group_ids || [];
                    console.log("Setting Datasource Group:", data_source_group_ids);

                    loadAudiences(ad.currency_of_record, audience_ids);
                    loadDatasourceGroups(ad.currency_of_record, data_source_group_ids);

                    $("#loadingOverlay").hide();
                },
                error: function (xhr, status, error) {
                    console.error("Error fetching data:", error);
                    $("#loadingOverlay").hide();
                },
                complete: function () {
                    $("#loadingOverlay").hide();
                }
            });
        }else {
            loadAudiences($('#currencyOfRecord').val());
            loadDatasourceGroups($('#currencyOfRecord').val());
            $("#loadingOverlay").hide();
        }
    }

    getReport();

    $('.select2-single').select2({ placeholder: "Select an option", allowClear: true });
    $('.select2-multi').select2({ placeholder: "Select one or more options" });

});

let emailModal;

function openEmailModal() {
    if (!spotLevelExportLink) {
        alert("Spot level export not available.");
        return;
    }
    emailModal = new bootstrap.Modal(document.getElementById('emailModal'));
    $("#toEmail").val("");
    emailModal.show();
}

function sendEmail() {
    const toEmail = $("#toEmail").val();

    if (!toEmail) {
        alert("Please enter email address.");
        return;
    }

    let reportName =  $("#reportName").val();

    $("#loadingOverlay").show();

    $.ajax({
        url: "/send-spot-export-email",
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify({
            reportId: reportId,
            reportName: reportName,
            toEmail: toEmail,
            attachmentUrl: spotLevelExportLink
        }),
        success: function () {
            alert("Email sent successfully.");
            emailModal.hide();
            $("#loadingOverlay").hide();
        },
        error: function (err) {
            console.error("Email error", err);
            alert("Failed to send email.");
            $("#loadingOverlay").hide();
        }
    });
}

</script>


</body>
</html>
