<!DOCTYPE html>
<html>
<head>
    <title>Plans</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <style>
        body {
            background-color: #f8f9fa;
        }

        .mt-5 {
            margin-top: 2rem !important;
        }

        .container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-weight: 600;
            color: #fff;
            margin: 0;
        }

        .dataTables_wrapper .dataTables_length {
            display: none; /* hide Show entries dropdown */
        }

        .dataTables_wrapper .dataTables_filter {
            float: left !important; /* move search box to left */
        }

        .btn {
            border-radius: 50px;
            padding: 6px 20px;
            font-weight: 500;
        }

        table.dataTable thead {
            background-color: #0d6efd;
            color: white;
        }

        tfoot {
            display: none;
        }

        .back-icon {
            font-size: 1.4rem;
            color: #fff;
            text-decoration: none;
        }

        .back-icon:hover {
            color: #d1e0ff;
        }

        .page-header {
            background-color: #0d6efd;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }

		.page-header {
    background-color: #0d6efd;
    padding: 0.5rem 1rem;
    border-radius: 10px;
    margin-bottom: 1.5rem;
}

h2 {
    font-weight: 600;
    color: #fff;
    font-size: 1.25rem;
    margin: 0;
}

.back-icon {
    font-size: 1.2rem;
    color: #fff;
    text-decoration: none;
    line-height: 1;
}

 .loadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(255, 255, 255, 0.3);
      display: flex !important;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      cursor: wait;
      display: none;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #dbe3ff;
      border-top: 6px solid #0d6efd;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <a href="/" class="me-3 back-icon"><i class="bi bi-arrow-left-circle-fill"></i></a>
            <h2>Plans</h2>
        </div>
        <div>
            <button class="btn btn-light" onclick="window.location='/campaigns'">Campaigns</button>
            <button class="btn btn-light" onclick="window.location='/create-plan'">Create Plan</button>
        </div>
    </div>

    <div class="table-responsive">
        <table id="planTable" class="display table table-striped" style="width:100%">
            <thead>
                <tr>
                   <th>ID</th>
                    <th>Name</th>
                    <th>Budget</th>
                    <th>Created On</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="6" class="text-center">Fetching data, Please wait...</td></tr>
            </tbody>
            <tfoot>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Budget</th>
                    <th>Created AT</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<div class="modal fade" id="planModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Reach Info</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="row mb-2">
            <div class="col-4 fw-bold py-1">Plan Name:</div>
            <div class="col-8" id="modalPlanName"></div>
        </div>
        <div class="row" style="padding:0 10px;">
            <table id="reachTable" class="display table table-striped" style="width:100%">
            <!--<thead>
                <tr>
                    <th>Metric</th>
                    <th>Total</th>
                </tr>
            </thead>-->
            <tbody>
                <tr><td colspan="2" class="text-center">Fetching reach, Please wait...</td></tr>
            </tbody>
            </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="loadingOverlay">
  <div class="loadingOverlay">
    <div class="text-center">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    $(document).ready(function () {
        $("#loadingOverlay").show();
        $.ajax({
            url: '/get-plans',
            type: 'GET',
            success: function (result) {
                let resultJson = JSON.parse(result);
                console.log("resultJson", resultJson);
                let data = resultJson.results;
                data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                console.log("data", data);
                let rows = '';
                $.each(data, function (index, item) {
                    rows += `<tr>
                        <td>${item.id}</td>
                        <td>${item.display_name}</td>
                        <td>${item.budget}</td>
                        <td>${item.created_at}</td>
                        <td>${item.status}</td>
                        <td>
                            <div class="dropdown">
                                <a href="#" class="text-dark" data-bs-toggle="dropdown">
                                    <i class="bi bi-three-dots-vertical fs-4"></i>
                                </a>
                                <ul class="dropdown-menu dropdown-menu-end">
                                    ${item.status == 'READY' ?
                                     `<li><a class="dropdown-item" href="#" onclick="fnShowModel('${item.id}', '${item.display_name}')" title="View">
                                             <i class="bi bi-eye me-2"></i> View
                                        </a></li>`
                                     : ''}
                                    <li><hr class="dropdown-divider"></li>
                                    <li>
                                        <a class="dropdown-item text-danger" href="#" onclick="fnDelete('${item.id}')">
                                           <i class="bi bi-trash me-2"></i> Delete
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </td>
                    </tr>`;
                });
                $('#planTable tbody').html(rows);
                $('#planTable').DataTable({destroy: true, order: [[3, 'desc']]});
                $("#loadingOverlay").hide();
            },
            error: function (xhr, status, error) {
                console.error("Error fetching data:", error);
                $("#loadingOverlay").hide();
            }
        });
    });

    function fnShowModel(id, name) {
        console.log("id", id, "name", name);
        $('#modalPlanName').text(name);
        $('#reachTable tbody').html('<tr><td colspan="2" class="text-center">Fetching reach, Please wait...</td></tr>');
        fnGetReach(id);
        const modal = new bootstrap.Modal(document.getElementById('planModal'));
        modal.show();
    }

    function fnGetReach(id) {
        $("#loadingOverlay").show();
        $.ajax({
            url: '/get-reach',
            type: 'GET',
            data: { planId: id },
            success: function (response) {
                let reachData = typeof response === "string" ? JSON.parse(response) : response;
                console.log("reachData", reachData);
                let rows = '';
                $.each(reachData, function (index, item) {
                    rows += `<tr>
                        <td>${item.Metric}</td>
                        <td>${item.Total}</td>
                    </tr>`;
                });
                $('#reachTable tbody').html(rows);

                $("#loadingOverlay").hide();
            },
            error: function (xhr, status, error) {
              console.error("Error fetching reach:", error);
              $("#loadingOverlay").hide();
            }
        });
    }

    function fnDelete(id) {
        if (confirm("Are you sure you want to delete this plan?")) {
            console.log("Delete plan id:", id);

            $("#loadingOverlay").show();
            $.ajax({
                url: '/delete-plan',
                type: 'GET',
                data: {
                planID: id
                },
                success: function (result) {
                    //let resultJson = JSON.parse(result);
                    //console.log("resultJson", resultJson);
                    $("#loadingOverlay").hide();

                    alert("Plan deleted successfully.");

                    let table = $('#planTable').DataTable();
                    table
                        .rows(function (idx, data, node) {
                            return data[0] === id;
                        })
                        .remove()
                        .draw();
                },
                error: function (xhr, status, error) {
                    console.error("Error deleting the report:", error);
                    $("#loadingOverlay").hide();
                },
                complete: function () {
                    $("#loadingOverlay").hide();
                }
            });
        }
    }
</script>
</body>
</html>
