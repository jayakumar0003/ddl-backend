<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDL Portal</title>

  <!-- CSS Libraries -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    html, body {
      margin: 0;
      background: #fff;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 14px;
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 10px 20px;
      background: #f1f7f7;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }

    .left-box,
    .right-box {
      display: flex;
      align-items: center;
    }

    .logo {
      height: 40px;
      border-radius: 6px;
    }

    .title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #0A3D62;
      margin: 0;
      text-align: center;
      flex: 1;
    }

    .user-info {
      font-weight: 600;
      color: #0A3D62;
      white-space: nowrap;
    }

    @media (max-width: 576px) {
      .title {
        order: 3;
        width: 100%;
        margin-top: 5px;
      }
    }

    /* ===== TILE GRID ===== */
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 16px 40px;
    }

    .tile {
      padding: 28px 18px;
      border-radius: 14px;
      display: flex;
      align-items: center;        /* vertical center */
      justify-content: center;    /* horizontal center */
      text-align: center;         /* text center */
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,.08);
      transition: transform .25s ease, opacity .25s ease;
    }

    .tile:hover {
      transform: translateY(-6px);
      opacity: .92;
    }

    /* Tile Colors */
    .create-plan { background:#6A4DFF; }
    .actualize-plan { background:#59D36F; }
    .upload-csv { background:#003C71; }
    .documentation { background:#00C2CB; color:#000; }
    .audiences { background:#7defef; color:#000; }
    .reach-summary { background:#54cb69; }
    .datasource { background:#0da4ab; }
    .measurement-report { background:#0b6a6f; }

    /* ===== RESPONSIVE GRID ===== */
    @media (max-width: 992px) {
      .tile-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 576px) {
      .tile-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 1200px) {
      .tile {
        min-height: 130px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="left-box">
      <img src="/static/wpp-logo.JPG" class="logo" alt="Logo">
    </div>

    <h1 class="title">DDL v0.0</h1>

    <div class="right-box">
      <div class="user-info">{{ session['user_email'] }}</div>
    </div>
  </header>

  <!-- DASHBOARD TILES -->
  <div class="tile-grid">

    <div class="tile create-plan" onclick="location.href='/plan'">Create Plan</div>
    <div class="tile actualize-plan" onclick="location.href='/actualize-plan'">Actualize Plan</div>
    <div class="tile upload-csv" onclick="location.href='/upload-csv'">Upload VideoAmp CSV</div>
    <div class="tile documentation" onclick="location.href='#'">Documentation</div>

    <div class="tile audiences" onclick="location.href='/audiences'">Audiences</div>
    <div class="tile reach-summary" onclick="location.href='/campaigns'">VA Campaign Planning</div>
    <div class="tile datasource" onclick="location.href='/datasource-groups'">Datasource Groups</div>
    <div class="tile measurement-report" onclick="location.href='/measurement-reports'">
      Ad Measurement Reports
    </div>

  </div>

</body>
</html>
