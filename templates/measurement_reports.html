<!DOCTYPE html>
<html>
<head>
    <title>Ad Measurement Reports</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <style>
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
    }
        body {
            background-color: #f8f9fa;
        }

        .mt-5 {
            margin-top: 2rem !important;
        }

        .container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-weight: 600;
            color: #fff;
            margin: 0;
        }

        .dataTables_wrapper .dataTables_length {
            display: none; /* hide Show entries dropdown */
        }

        .dataTables_wrapper .dataTables_filter {
            float: left !important; /* move search box to left */
        }

        .btn {
            border-radius: 50px;
            padding: 6px 20px;
            font-weight: 500;
        }

        table.dataTable thead {
            background-color: #0d6efd;
            color: white;
        }

        tfoot {
            display: none;
        }

        .back-icon {
            font-size: 1.4rem;
            color: #fff;
            text-decoration: none;
        }

        .back-icon:hover {
            color: #d1e0ff;
        }

        .page-header {
            background-color: #0d6efd;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }

		.page-header {
            background-color: #0d6efd;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }

        h2 {
            font-weight: 600;
            color: #fff;
            font-size: 1.25rem;
            margin: 0;
        }

        .back-icon {
            font-size: 1.2rem;
            color: #fff;
            text-decoration: none;
            line-height: 1;
        }

 .loadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(255, 255, 255, 0.3);
      display: flex !important;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      cursor: wait;
      display: none;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #dbe3ff;
      border-top: 6px solid #0d6efd;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    a i.bi {
        transition: transform 0.2s ease, opacity 0.2s ease;
    }
    a:hover i.bi {
        transform: scale(1.2);
        opacity: 0.8;
    }


    </style>
</head>
<body>
<div class="container mt-5">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <a href="/" class="me-3 back-icon"><i class="bi bi-arrow-left-circle-fill"></i></a>
            <h2>Ad Measurement Reports</h2>
        </div>
        <div>
            <button class="btn btn-light" onclick="window.location='/create-report'">Create Report</button>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-6">
            <label for="reportID" class="form-label">Search By Full ID Only</label>
            <input id="reportID" type="text" class="form-control" placeholder="">
        </div>

        <div class="col-md-6">
            <label for="requestType" class="form-label">Request Type</label>
            <select id="requestType" class="form-select">
              <option value="">All</option>
              <option value="ESSENTIALS">Ads - Audience Essentials</option>
              <option value="ADVANCED_RF">Ads - Advanced Reach & Frequency</option>
              <option value="DAYPART">Content - Network/Daypart Report</option>
            </select>
        </div>
    </div>


    <div class="table-responsive">
        <table id="reportTable" class="display table table-striped" style="width:100%">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Request Type</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Created On</th>
                    <th>Status</th>
                    <th class="text-center"></th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="7" class="text-center">Fetching data, Please wait...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="loadingOverlay">
  <div class="loadingOverlay">
    <div class="text-center">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    $(document).ready(function () {

        function fetchReports() {
            $("#loadingOverlay").show();
            $.ajax({
                url: '/get-admeasurements',
                type: 'GET',
                data: {
                reportID: $('#reportID').val(),
                requestType: $('#requestType').val()
                },
                success: function (result) {
                    let resultJson = JSON.parse(result);
                    //console.log("resultJson", resultJson);
                    let data = resultJson.results;
                    //console.log("data", data);

                    if ($.fn.DataTable.isDataTable('#reportTable')) {
                        $('#reportTable').DataTable().destroy();
                    }

                    $('#reportTable tbody').empty();

                    let rows = '';
                    let rowId = 0;
                    $.each(data, function (index, item) {
                        rowId++;
                        let itemStatus = item.latest_request?.status;
                        rows += `<tr>
                            <td>${item.id}</td>
                            <td>${item.name}</td>
                            <td>${item.type}</td>
                            <td>${item.start_date}</td>
                            <td>${item.end_date}</td>
                            <td>${item.created_at}</td>
                            <td id="vwStatus${rowId}">${itemStatus}</td>
                           <td class="text-center">
                            <div class="dropdown">
                                <a href="#" class="text-dark" data-bs-toggle="dropdown">
                                    <i class="bi bi-three-dots-vertical fs-4"></i>
                                </a>
                                <ul class="dropdown-menu dropdown-menu-end">

                                     <li>
                                        <a class="dropdown-item" href="#" onclick="fnViewReport('${item.id}')">
                                            <i class="bi bi-eye me-2"></i> View
                                        </a>
                                    </li>
                                    <li>
                                        <a class="dropdown-item" href="#" onclick="fnCloneReport('${item.id}')">
                                            <i class="bi bi-files me-2"></i> Clone
                                        </a>
                                    </li>
                                    <li>
                                        <a class="dropdown-item"
                                           href="#"
                                           onclick="fnRefreshReport('${item.id}')">
                                           <i class="bi bi-arrow-clockwise me-2"></i> Refresh
                                        </a>
                                    </li>


                                    <li><hr class="dropdown-divider"></li>

                                    <li>
                                        <a class="dropdown-item text-danger"
                                           href="#"
                                           onclick="fnDeleteReport('${item.id}')">
                                           <i class="bi bi-trash me-2"></i> Delete
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </td>
                        </tr>`;
                    });
                    $('#reportTable tbody').html(rows);
                    $('#reportTable').DataTable(
                    {
                        destroy: true,
                        order: [[5, 'desc']],
                        searching: false
                    });
                    $("#loadingOverlay").hide();
                },
                error: function (xhr, status, error) {
                    console.error("Error fetching data:", error);
                    $("#loadingOverlay").hide();
                }
            });
        }

        fetchReports();

        $('#reportID').on('keyup', function () {
            fetchReports();
        });

        $('#requestType').on('change', function () {
            fetchReports();
        });

    });

    /* " <li>
        <a class="dropdown-item ${itemStatus === 'succeeded' ? '' : 'disabled'}"
           href="#"
           onclick="fnDownloadReport('${item.id}')">
           <i class="bi bi-download me-2"></i> Download
        </a>
    </li>";
*/

    function fnDownloadReport(id) {
        console.log("id", id);
        $("#loadingOverlay").show();
        $.ajax({
            url: '/get-admeasurement',
            type: 'GET',
            data: {
            reportID: id
            },
            success: function (result) {
                let resultJson = JSON.parse(result);
                console.log("resultJson", resultJson);
                const link = resultJson?.latest_request?.outputs?.[0]?.link;
                if (link) {
                    window.open(link, '_blank');
                } else {
                    alert("No download link available for this report.");
                }

                $("#loadingOverlay").hide();
            },
            error: function (xhr, status, error) {
                console.error("Error fetching data:", error);
                $("#loadingOverlay").hide();
            },
            complete: function () {
                $("#loadingOverlay").hide();
            }
        });
    }

    function fnRefreshReport(id, rowId) {
        console.log("id", id, "rowId", rowId);
        $("#loadingOverlay").show();
        $.ajax({
            url: '/get-admeasurement',
            type: 'GET',
            data: {
            reportID: id
            },
            success: function (result) {
                let resultJson = JSON.parse(result);
                console.log("resultJson", resultJson);
                const status = resultJson?.latest_request?.status;
                $("#vwStatus"+rowId).text(status);
                $("#loadingOverlay").hide();
            },
            error: function (xhr, status, error) {
                console.error("Error fetching data:", error);
                $("#loadingOverlay").hide();
            },
            complete: function () {
                $("#loadingOverlay").hide();
            }
        });
    }

    function fnDeleteReport(id) {
        if (confirm("Are you sure you want to delete this report?")) {
            console.log("Delete report:", id);

            $("#loadingOverlay").show();
            $.ajax({
                url: '/delete-admeasurement',
                type: 'GET',
                data: {
                reportID: id
                },
                success: function (result) {
                    let resultJson = JSON.parse(result);
                    console.log("resultJson", resultJson);
                    $("#loadingOverlay").hide();

                    alert("Report deleted successfully.");

                    let table = $('#reportTable').DataTable();
                    table
                        .rows(function (idx, data, node) {
                            return data[0] === id;
                        })
                        .remove()
                        .draw();
                },
                error: function (xhr, status, error) {
                    console.error("Error deleting the report:", error);
                    $("#loadingOverlay").hide();
                },
                complete: function () {
                    $("#loadingOverlay").hide();
                }
            });
        }
    }

    function fnViewReport(id) {
        window.location = "/view-report?id=" + id;
    }

    function fnCloneReport(id) {
        window.location = "/create-report?id=" + id;
    }

</script>
</body>
</html>
