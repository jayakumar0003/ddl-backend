<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CREATE Campaign</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>  
	body {
		background-color: #f8f9fa;
	}
	.mt-5 {
            margin-top: 2rem !important;
        }

	.container {
		background-color: #fff;
		padding: 2rem;
		border-radius: 16px;
		box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
	}
	
	mt-5 {
    margin-top: 2rem !important;
}

	h2 {
		font-weight: 600;
		color: #fff;
		margin: 0;
	}      

	.btn {
		border-radius: 50px;
		padding: 6px 20px;
		font-weight: 500;
	}

	table.dataTable thead {
		background-color: #0d6efd;
		color: white;
	}

	tfoot {
		display: none;
	}

	.back-icon {
		font-size: 1.4rem;
		color: #fff;
		text-decoration: none;
	}

	.back-icon:hover {
		color: #d1e0ff;
	}

	.page-header {
		background-color: #0d6efd;
		padding: 1rem 1.5rem;
		border-radius: 10px;
		margin-bottom: 1.5rem;
	}

	.page-header {
		background-color: #0d6efd;
		padding: 0.5rem 1rem;
		border-radius: 10px;
		margin-bottom: 1.5rem;
	}

	h2 {
		font-weight: 600;
		color: #fff;
		font-size: 1.25rem;
		margin: 0;
	}

	.back-icon {
		font-size: 1.2rem;
		color: #fff;
		text-decoration: none;
		line-height: 1;
	}

	.select2-container .select2-selection--single,
    .select2-container .select2-selection--multiple {
      height: 38px;
      padding: 5px;
    }
    </style>
</head>
<body>
<div class="container mt-5">
  <div class="page-header d-flex justify-content-between align-items-center">
	<div class="d-flex align-items-center">
		<a href="/campaigns" class="me-3 back-icon"><i class="bi bi-arrow-left-circle-fill"></i></a>
		<h2>Create Campaign</h2>
	</div>
</div>

  <form>    
    <div class="mb-3">
      <label for="displayName" class="form-label">Display Name</label>
      <input type="text" class="form-control" id="displayName" placeholder="">
    </div>

    <div class="mb-3">
      <label for="audienceId" class="form-label">Audience</label>
      <select id="audienceId" class="form-select select2-multi" multiple>
      </select>
    </div>

    <div class="mb-3">
      <label for="startDate" class="form-label">Start Date</label>
     <input type="date" class="form-control" id="startDate" >
    </div>

     <div class="mb-3">
      <label for="endDate" class="form-label">End Date</label>
     <input type="date" class="form-control" id="endDate" >
    </div>

   <div class="mb-3">
      <label for="creativeDuration" class="form-label">Creative Duration (seconds)</label>
      <input type="text" class="form-control" id="creativeDuration" >
    </div>

    <div class="mb-3" style="display:none">
      <label for="inventorySetId" class="form-label">Inventory Set Id</label>
      <input type="text" class="form-control" id="inventorySetId" value="bbc0f6e9-75e4-44fe-864c-b0707398f5fa" readonly>
    </div>

    <div class="mb-3" style="display:none">
      <label for="agencyAdvertiserId" class="form-label">Agency Advertiser Id</label>
      <input type="text" class="form-control" id="agencyAdvertiserId" value="3252" readonly>
    </div>

    <button type="submit" class="btn btn-primary">Submit</button>
  </form>

</div>
  <br/>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
$(document).ready(function () {
    function safeJsonParse(str) {
        try {
          return typeof str === "string" ? JSON.parse(str) : str;
        } catch (e) {
          console.error("JSON parse error:", e);
          return {};
        }
    }

    $.ajax({
        url: '/get-audiences-list',
        type: 'GET',
        success: function (result) {
          const data = safeJsonParse(result).data || [];
          const $audienceSelect = $('#audienceId');
          $audienceSelect.empty().append('<option value="">Select Audience</option>');

          data.forEach(item => {
            if (item.audienceUUId && item.name) {
              $audienceSelect.append(new Option(item.name, item.audienceUUId));
            }
          });

          $audienceSelect.trigger('change');
        },
        error: (xhr, status, error) => console.error("Error fetching audience list:", error)
    });


  $('form').on('submit', function (e) {
    e.preventDefault();

    const displayName = $('#displayName').val().trim();
    const audienceIds = $('#audienceId').val()|| [];
    const startDate = $('#startDate').val().trim();
    const endDate = $('#endDate').val().trim();
    let creativeDuration = $('#creativeDuration').val().trim();

    if (!displayName) return alert("Display Name is required.");
    if (!Array.isArray(audienceIds) || audienceIds.length === 0) return alert("At least one Audience must be selected.");
    if (!startDate) return alert("Start Date is required.");
    if (!endDate) return alert("End Date is required.");
    if (!creativeDuration) return alert("Creative Duration is required.");
    //if (!creativeDuration || isNaN(creativeDuration) || Number(creativeDuration) <= 0) return alert("Valid Creative Duration is required.");

    const creativeDurationsArray = creativeDuration
      .split(",")
      .map(d => d.trim())
      .filter(d => d !== "")
      .map(Number)
      .filter(n => !isNaN(n) && n > 0);

    if (creativeDurationsArray.length === 0) {
      return alert("Valid Creative Duration(s) required.");
    }

    const payload = {
      display_name: displayName,
      audience_ids: audienceIds,
      media_end_date: endDate,
      media_start_date: startDate,
      creative_durations_seconds: creativeDurationsArray,
      inventory_set_id: "c37249ab-d711-4a18-83d5-027306670cb5",
      agency_advertiser_id: 3252
    };

    console.log("payload:", payload);

    $.ajax({
        url: '/submit-campaign',
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(payload),
        success: function (res) {
        alert("Campaign submitted successfully!");
        console.log("Response:", res);
        window.location.href = "/campaigns";
        },
        error: function (xhr, status, error) {
        console.error("Submit failed:", error);
        alert("Failed to submit campaign.");
        }
    });
  });

  $('.select2-single').select2({ placeholder: "Select an option", allowClear: true });
  $('.select2-multi').select2({ placeholder: "Select one or more options" });

});
</script>

</body>
</html>
